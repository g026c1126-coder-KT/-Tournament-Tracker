<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Manager Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .chart-container { position: relative; width: 100%; height: 350px; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #1d4ed8; font-weight: 700; }
        .mode-card:hover { transform: translateY(-5px); transition: all 0.2s ease; }
        body { background-color: #f8fafc; color: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <!-- モード選択画面 -->
    <div id="gate-screen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
        <div class="max-w-5xl w-full text-center">
            <h1 class="text-4xl font-black text-white mb-4 italic">TOURNAMENT MANAGER</h1>
            <p class="text-slate-400 mb-12">大会形式を選択して開始してください</p>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <button onclick="initApp('points')" class="mode-card bg-white p-6 rounded-2xl shadow-2xl text-left group">
                    <div class="text-3xl mb-4">📊</div>
                    <h2 class="text-xl font-bold text-slate-800 mb-2">ポイント制</h2>
                    <p class="text-slate-500 text-xs mb-6">順位とキル数で集計。バトルロイヤルなどに。</p>
                    <span class="inline-block bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold group-hover:bg-blue-700">選択する</span>
                </button>

                <button onclick="initApp('swiss')" class="mode-card bg-white p-6 rounded-2xl shadow-2xl text-left group">
                    <div class="text-3xl mb-4">⚔️</div>
                    <h2 class="text-xl font-bold text-slate-800 mb-2">スイスドロー</h2>
                    <p class="text-slate-500 text-xs mb-6">成績の近い順にマッチング。TCGなどに。</p>
                    <span class="inline-block bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold group-hover:bg-indigo-700">選択する</span>
                </button>

                <button onclick="initApp('roundrobin')" class="mode-card bg-white p-6 rounded-2xl shadow-2xl text-left group">
                    <div class="text-3xl mb-4">🔄</div>
                    <h2 class="text-xl font-bold text-slate-800 mb-2">総当たり戦</h2>
                    <p class="text-slate-500 text-xs mb-6">全参加者と対戦。リーグ戦などに。</p>
                    <span class="inline-block bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold group-hover:bg-emerald-700">選択する</span>
                </button>
            </div>
        </div>
    </div>

    <!-- メインアプリ -->
    <div id="app-content" class="hidden">
        <header class="bg-white border-b sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <span id="header-icon" class="text-2xl"></span>
                    <h1 id="header-title" class="font-bold text-lg text-slate-800"></h1>
                </div>
                <button onclick="location.reload()" class="text-xs bg-slate-100 px-3 py-1.5 rounded hover:bg-slate-200">
                    🔄 形式を選び直す
                </button>
            </div>
            <nav class="max-w-7xl mx-auto px-4 flex space-x-8 overflow-x-auto">
                <button id="tab-btn-settings" class="tab-btn tab-active py-4 px-2 text-sm whitespace-nowrap" onclick="switchTab('settings')">1. 大会設定</button>
                <button id="tab-btn-input" class="tab-btn py-4 px-2 text-sm text-slate-500 whitespace-nowrap" onclick="switchTab('input')">2. 結果入力</button>
                <button id="tab-btn-results" class="tab-btn py-4 px-2 text-sm text-slate-500 whitespace-nowrap" onclick="switchTab('results')">3. リザルト</button>
            </nav>
        </header>

        <main class="max-w-7xl mx-auto px-4 py-6">
            <!-- SETTINGS -->
            <section id="section-settings" class="block space-y-6">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-xl shadow-sm border space-y-4 h-fit">
                        <h3 class="font-bold border-b pb-2 text-slate-700 text-sm">基本構成</h3>
                        <div>
                            <label class="text-xs font-bold text-slate-500">参加人数</label>
                            <input type="number" id="cfg-teams" value="8" min="2" max="64" class="w-full border rounded p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div id="round-config-area">
                            <label class="text-xs font-bold text-slate-500">ラウンド数</label>
                            <input type="number" id="cfg-rounds" value="3" min="1" class="w-full border rounded p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        
                        <!-- Points Mode Only -->
                        <div id="points-extra-config" class="hidden">
                            <label class="text-xs font-bold text-slate-500">1キルあたりのポイント</label>
                            <input type="number" id="cfg-kill-pt" value="1" min="0" class="w-full border rounded p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>

                        <!-- Swiss/RoundRobin Mode Only -->
                        <div id="match-pts-config" class="hidden pt-4 border-t space-y-3">
                            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">勝敗ポイント配分</h4>
                            <div class="grid grid-cols-3 gap-2">
                                <div>
                                    <label class="text-[10px] text-slate-500">勝ち</label>
                                    <input type="number" id="cfg-win-pt" value="3" class="w-full border rounded p-1 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                                </div>
                                <div>
                                    <label class="text-[10px] text-slate-500">引分</label>
                                    <input type="number" id="cfg-draw-pt" value="1" class="w-full border rounded p-1 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                                </div>
                                <div>
                                    <label class="text-[10px] text-slate-500">負け</label>
                                    <input type="number" id="cfg-loss-pt" value="0" class="w-full border rounded p-1 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                                </div>
                            </div>
                        </div>
                        
                        <button onclick="applySettings()" class="w-full bg-slate-800 text-white py-3 rounded-lg font-bold hover:bg-slate-700 transition-colors shadow-lg active:scale-95">
                            設定を適用して開始
                        </button>
                    </div>
                    <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border">
                        <div id="settings-dynamic-area" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
                    </div>
                </div>
            </section>

            <!-- INPUT -->
            <section id="section-input" class="hidden space-y-6">
                <div id="input-container" class="bg-white rounded-xl shadow-sm border overflow-hidden"></div>
                
                <!-- Adjustments Area -->
                <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                    <div class="bg-slate-100 px-4 py-3 font-bold text-slate-700 border-b flex justify-between items-center">
                        <span>特殊加減点 (ボーナス・ペナルティ)</span>
                        <span class="text-[10px] font-normal text-slate-500">※大会全体のスコアに直接加算・減算されます</span>
                    </div>
                    <div id="adjustment-container" class="p-4 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
                </div>
            </section>

            <!-- RESULTS -->
            <section id="section-results" class="hidden space-y-6">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="bg-white rounded-xl shadow-sm border overflow-hidden h-fit">
                        <div class="bg-slate-800 text-white px-4 py-3 font-bold">最終順位</div>
                        <table class="w-full text-sm">
                            <thead class="bg-slate-50 border-b">
                                <tr>
                                    <th class="px-4 py-3 text-left w-12">位</th>
                                    <th class="px-4 py-3 text-left">チーム名</th>
                                    <th id="score-label" class="px-4 py-3 text-right">スコア</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboard-body" class="divide-y"></tbody>
                        </table>
                    </div>
                    <div class="lg:col-span-2 space-y-6">
                        <div class="bg-white p-6 rounded-xl shadow-sm border">
                            <h3 class="font-bold mb-4 text-slate-700">スコア統計</h3>
                            <div class="chart-container"><canvas id="resultChart"></canvas></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let appMode = 'points';
        let state = {
            numTeams: 8,
            numRounds: 3,
            killPt: 1,
            winPt: 3,
            drawPt: 1,
            lossPt: 0,
            teams: {}, 
            placementPts: {},
            adjustments: {}, 
            data: [] 
        };
        let chartInstance = null;

        // --- Init ---
        window.initApp = (mode) => {
            appMode = mode;
            document.getElementById('gate-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            
            const titles = { points: 'ポイント制モード', swiss: 'スイスドローモード', roundrobin: '総当たり戦モード' };
            const icons = { points: '📊', swiss: '⚔️', roundrobin: '🔄' };
            document.getElementById('header-title').innerText = titles[mode];
            document.getElementById('header-icon').innerText = icons[mode];

            // モードに応じた設定項目の表示・非表示
            const isPoints = mode === 'points';
            document.getElementById('points-extra-config').classList.toggle('hidden', !isPoints);
            document.getElementById('match-pts-config').classList.toggle('hidden', isPoints);
            document.getElementById('round-config-area').classList.toggle('hidden', mode === 'roundrobin');

            resetState();
            renderSettings();
        };

        window.resetState = () => {
            // 入力値の取得
            state.numTeams = Math.min(64, parseInt(document.getElementById('cfg-teams').value) || 2);
            state.numRounds = parseInt(document.getElementById('cfg-rounds').value) || 1;
            state.killPt = parseInt(document.getElementById('cfg-kill-pt').value) || 0;
            state.winPt = parseInt(document.getElementById('cfg-win-pt').value) || 0;
            state.drawPt = parseInt(document.getElementById('cfg-draw-pt').value) || 0;
            state.lossPt = parseInt(document.getElementById('cfg-loss-pt').value) || 0;

            state.teams = {};
            state.adjustments = {};
            for (let i = 1; i <= state.numTeams; i++) {
                state.teams[i] = `チーム ${i}`;
                state.adjustments[i] = 0;
            }

            if (appMode === 'points') {
                state.placementPts = {};
                for (let i = 1; i <= state.numTeams; i++) {
                    state.placementPts[i] = i === 1 ? 12 : (i === 2 ? 9 : (i === 3 ? 7 : Math.max(0, 6 - i)));
                }
                state.data = Array.from({ length: state.numRounds }, () => ({}));
            } else if (appMode === 'roundrobin') {
                const n = state.numTeams;
                state.numRounds = (n % 2 === 0) ? n - 1 : n;
                state.data = Array.from({ length: state.numRounds }, () => []);
                generateRoundRobinMatches();
            } else {
                state.data = Array.from({ length: state.numRounds }, () => []);
            }
        };

        window.applySettings = () => {
            resetState(); // 内部変数を入力値に合わせて更新
            renderSettings(); // UI（チーム名入力欄など）を再生成
            switchTab('settings');
            alert('設定を適用しました。入力タブから結果を記入してください。');
        };

        // --- UI Rendering ---
        window.renderSettings = () => {
            const area = document.getElementById('settings-dynamic-area');
            area.innerHTML = '';

            let teamHtml = `<div><h4 class="font-bold mb-3 text-slate-700 text-sm">参加チーム名</h4><div class="space-y-2 h-[400px] overflow-y-auto custom-scrollbar pr-2">`;
            for (let i = 1; i <= state.numTeams; i++) {
                teamHtml += `
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold text-slate-400 w-8">#${i}</span>
                    <input type="text" value="${state.teams[i]}" onchange="state.teams[${i}] = this.value" class="flex-1 border rounded px-2 py-1 text-sm outline-blue-400">
                </div>`;
            }
            teamHtml += `</div></div>`;

            let rightHtml = `<div>`;
            if (appMode === 'points') {
                rightHtml += `<h4 class="font-bold mb-3 text-slate-700 text-sm">順位別獲得ポイント</h4><div class="space-y-2 h-[400px] overflow-y-auto custom-scrollbar pr-2">`;
                for (let i = 1; i <= state.numTeams; i++) {
                    rightHtml += `
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-slate-500 w-12">${i}位</span>
                        <input type="number" value="${state.placementPts[i]}" onchange="state.placementPts[${i}] = parseInt(this.value) || 0" class="w-full border rounded px-2 py-1 text-sm outline-blue-400">
                    </div>`;
                }
                rightHtml += `</div>`;
            } else {
                rightHtml += `<h4 class="font-bold mb-3 text-slate-700 text-sm">モード説明</h4>
                    <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl text-xs text-blue-800 space-y-3">
                        <p>・<strong>${appMode === 'swiss' ? 'スイスドロー' : '総当たり戦'}</strong>として動作します。</p>
                        <p>・勝利時：${state.winPt}pt / 引分時：${state.drawPt}pt / 敗北時：${state.lossPt}pt</p>
                        <p>・入力タブで勝者を選択してください。</p>
                    </div>`;
            }
            rightHtml += `</div>`;
            area.innerHTML = teamHtml + rightHtml;
        };

        function generateRoundRobinMatches() {
            let teams = Array.from({length: state.numTeams}, (_, i) => i + 1);
            if (teams.length % 2 !== 0) teams.push('BYE');
            const n = teams.length;
            for (let r = 0; r < n - 1; r++) {
                for (let i = 0; i < n / 2; i++) {
                    const p1 = teams[i];
                    const p2 = teams[n - 1 - i];
                    if (p1 !== 'BYE' && p2 !== 'BYE') {
                        state.data[r].push({ p1, p2, winner: null });
                    } else if (p1 !== 'BYE' || p2 !== 'BYE') {
                        const player = p1 !== 'BYE' ? p1 : p2;
                        state.data[r].push({ p1: player, p2: 'BYE', winner: player });
                    }
                }
                teams.splice(1, 0, teams.pop());
            }
        }

        window.switchTab = (tabId) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active', 'text-blue-600'));
            document.getElementById(`tab-btn-${tabId}`).classList.add('tab-active');
            document.querySelectorAll('main > section').forEach(s => s.classList.replace('block', 'hidden'));
            document.getElementById(`section-${tabId}`).classList.replace('hidden', 'block');
            if (tabId === 'input') renderInput();
            if (tabId === 'results') renderResults();
        };

        window.renderInput = () => {
            const container = document.getElementById('input-container');
            const adjContainer = document.getElementById('adjustment-container');
            container.innerHTML = '';
            adjContainer.innerHTML = '';

            // Special Adjustments
            Object.entries(state.teams).forEach(([id, name]) => {
                adjContainer.innerHTML += `
                <div class="flex flex-col gap-1 p-2 border rounded bg-slate-50">
                    <span class="text-[9px] font-bold text-slate-400 truncate">${name}</span>
                    <input type="number" value="${state.adjustments[id]}" onchange="state.adjustments[${id}] = parseInt(this.value) || 0" 
                        class="w-full border rounded px-1 py-0.5 text-xs font-bold text-center ${state.adjustments[id] < 0 ? 'text-red-500' : 'text-blue-600'}">
                </div>`;
            });

            if (appMode === 'points') {
                renderPointsInput(container);
            } else {
                renderMatchInput(container);
            }
        };

        function renderPointsInput(container) {
            let html = `<div class="overflow-x-auto custom-scrollbar"><table class="w-full text-sm text-left border-collapse">
                <thead class="bg-slate-50 border-b"><tr><th class="px-4 py-3 sticky left-0 bg-slate-50 z-10 w-16 shadow-md">順位</th>`;
            for (let r = 1; r <= state.numRounds; r++) html += `<th class="px-4 py-3 min-w-[220px] border-l">試合 ${r}</th>`;
            html += `</tr></thead><tbody class="divide-y">`;
            for (let rank = 1; rank <= state.numTeams; rank++) {
                html += `<tr><td class="px-4 py-3 font-bold bg-white sticky left-0 shadow-md">${rank}位</td>`;
                for (let r = 0; r < state.numRounds; r++) {
                    const cell = state.data[r][rank] || { id: '', kills: 0 };
                    html += `<td class="px-4 py-2 border-l">
                        <div class="flex gap-1">
                            <select onchange="updatePointData(${r}, ${rank}, 'id', this.value)" class="flex-1 border rounded text-[10px] p-1">
                                <option value="">未選択</option>
                                ${Object.entries(state.teams).map(([id, name]) => `<option value="${id}" ${cell.id == id ? 'selected' : ''}>${name}</option>`).join('')}
                            </select>
                            <input type="number" value="${cell.kills}" onchange="updatePointData(${r}, ${rank}, 'kills', this.value)" placeholder="K" class="w-10 border rounded text-[10px] p-1 text-center">
                        </div>
                    </td>`;
                }
                html += `</tr>`;
            }
            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        function renderMatchInput(container) {
            let html = `<div class="p-6">`;
            for (let r = 0; r < state.numRounds; r++) {
                const matches = state.data[r];
                const isAccessible = (r === 0 || state.data[r-1].every(m => m.winner));
                html += `<div class="mb-8 last:mb-0">
                    <h4 class="font-bold text-slate-800 mb-3">ラウンド ${r + 1}</h4>`;
                
                if (appMode === 'swiss' && matches.length === 0 && isAccessible) {
                    html += `<button onclick="generateSwissPairings(${r})" class="bg-indigo-600 text-white px-4 py-2 rounded text-sm font-bold shadow hover:bg-indigo-700">対戦カード生成</button>`;
                } else if (matches.length > 0) {
                    html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">`;
                    matches.forEach((m, mIdx) => {
                        if (m.p2 === 'BYE') {
                            html += `<div class="border rounded-lg p-2 bg-slate-50 flex justify-between items-center opacity-60">
                                <span class="text-xs font-bold">${state.teams[m.p1]}</span>
                                <span class="text-[9px] font-black text-blue-500 uppercase">不戦勝</span>
                            </div>`;
                        } else {
                            html += `
                            <div class="border rounded-xl p-3 flex flex-col gap-2 ${!isAccessible ? 'opacity-40 grayscale pointer-events-none' : ''}">
                                <div class="flex items-center justify-between gap-1">
                                    <button onclick="setWinner(${r}, ${mIdx}, ${m.p1})" class="flex-1 text-[10px] py-1.5 rounded border ${m.winner == m.p1 ? 'bg-blue-600 text-white border-blue-600 font-bold' : 'bg-white'}">${state.teams[m.p1]}</button>
                                    <span class="text-[9px] text-slate-300">VS</span>
                                    <button onclick="setWinner(${r}, ${mIdx}, ${m.p2})" class="flex-1 text-[10px] py-1.5 rounded border ${m.winner == m.p2 ? 'bg-blue-600 text-white border-blue-600 font-bold' : 'bg-white'}">${state.teams[m.p2]}</button>
                                </div>
                                <button onclick="setWinner(${r}, ${mIdx}, 'draw')" class="text-[9px] py-1 border rounded hover:bg-slate-50 ${m.winner === 'draw' ? 'bg-amber-100 text-amber-700' : 'text-slate-400'}">引き分け</button>
                            </div>`;
                        }
                    });
                    html += `</div>`;
                }
                html += `</div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        window.updatePointData = (r, rank, field, val) => {
            if (!state.data[r][rank]) state.data[r][rank] = { id: '', kills: 0 };
            state.data[r][rank][field] = field === 'kills' ? (parseInt(val) || 0) : val;
        };

        window.setWinner = (r, mIdx, val) => {
            state.data[r][mIdx].winner = val;
            renderInput();
        };

        window.generateSwissPairings = (r) => {
            const standings = getStandings();
            const pool = [...standings];
            const pairs = [];
            while (pool.length > 1) {
                const p1 = pool.shift();
                const p2 = pool.shift();
                pairs.push({ p1: p1.id, p2: p2.id, winner: null });
            }
            if (pool.length === 1) {
                const p = pool.shift();
                pairs.push({ p1: p.id, p2: 'BYE', winner: p.id });
            }
            state.data[r] = pairs;
            renderInput();
        };

        function getStandings() {
            let stats = {};
            Object.keys(state.teams).forEach(id => {
                stats[id] = { id, name: state.teams[id], score: state.adjustments[id] || 0, kills: 0, wins: 0, ties: 0 };
            });

            if (appMode === 'points') {
                state.data.forEach(round => {
                    Object.entries(round).forEach(([rank, d]) => {
                        if (d.id && stats[d.id]) {
                            stats[d.id].score += (state.placementPts[rank] || 0) + (d.kills * state.killPt);
                            stats[d.id].kills += d.kills;
                        }
                    });
                });
                return Object.values(stats).sort((a, b) => b.score - a.score || b.kills - a.kills);
            } else {
                state.data.forEach(round => {
                    round.forEach(m => {
                        if (m.winner === 'draw') {
                            stats[m.p1].score += state.drawPt;
                            stats[m.p2].score += state.drawPt;
                            stats[m.p1].ties += 1;
                            stats[m.p2].ties += 1;
                        } else if (m.winner) {
                            stats[m.winner].score += state.winPt;
                            stats[m.winner].wins += 1;
                            const loser = m.winner == m.p1 ? m.p2 : m.p1;
                            if (loser !== 'BYE') stats[loser].score += state.lossPt;
                        }
                    });
                });
                return Object.values(stats).sort((a, b) => b.score - a.score || b.wins - a.wins);
            }
        }

        window.renderResults = () => {
            const standings = getStandings();
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = standings.map((s, i) => `
                <tr>
                    <td class="px-4 py-3 font-bold text-slate-400">#${i + 1}</td>
                    <td class="px-4 py-3">
                        <div class="font-bold text-slate-700">${s.name}</div>
                    </td>
                    <td class="px-4 py-3 text-right font-black text-blue-600">${s.score}</td>
                </tr>
            `).join('');

            renderChart(standings);
        };

        function renderChart(standings) {
            const ctx = document.getElementById('resultChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            const top = standings.slice(0, 15);
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: top.map(s => s.name),
                    datasets: [{
                        label: 'スコア',
                        data: top.map(s => s.score),
                        backgroundColor: '#3b82f6',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }
    </script>
</body>
</html>
